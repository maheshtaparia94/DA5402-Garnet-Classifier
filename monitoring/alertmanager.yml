global:
  resolve_timeout: 5m
  smtp_smarthost: 'sandbox.smtp.mailtrap.io:2525'
  smtp_from: 'alertmanager@garnet-classifier.local'
  smtp_auth_username: '${MAILTRAP_USERNAME}'
  smtp_auth_password: '${MAILTRAP_PASSWORD}'
  smtp_require_tls: true

route:
  group_by: ['alertname']
  group_wait: 5s
  group_interval: 5s
  repeat_interval: 2h
  receiver: 'email'
  routes:
    - match:
        severity: critical
      receiver: 'email'
      repeat_interval: 2h
    - match:
        severity: warning
      receiver: 'email'
      repeat_interval: 2h
    - match:
        severity: info
      receiver: 'email'
      repeat_interval: 2h

receivers:
  - name: 'email'
    email_configs:
      - to: '${ALERT_EMAIL}'
        send_resolved: true
        headers:
          subject: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']