global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "fastapi"
    scrape_interval: 15s
    static_configs:
      - targets: ["fastapi:8000"]
    metrics_path: /metrics

  - job_name: "node"
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "streamlit"
    scrape_interval: 15s
    static_configs:
      - targets: ["streamlit:8002"]

  - job_name: "model-server-status"
    scrape_interval: 60s
    metrics_path: /ready
    static_configs:
      - targets: ["fastapi:8000"]
