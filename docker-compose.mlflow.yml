services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${PSQL_MLFLOW_USER}
      POSTGRES_PASSWORD: ${PSQL_MLFLOW_PASSWORD}
      POSTGRES_DB: ${PSQL_MLFLOW_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PSQL_MLFLOW_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - mlflow-network

  mlflow-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${PSQL_MLFLOW_USER}:${PSQL_MLFLOW_PASSWORD}@postgres/${PSQL_MLFLOW_DB}
      MLFLOW_ARTIFACTS_DESTINATION: /mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mlflow-network

volumes:
  postgres-data:
  mlflow-artifacts:
    name: mlflow-artifacts

networks:
  mlflow-network:
    driver: bridge
    name: mlflow-network