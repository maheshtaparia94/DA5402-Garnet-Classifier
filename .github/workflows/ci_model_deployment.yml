name: Model Deployment CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'data/model_registry_log.txt'
      - 'api/**'
      - 'docker/Dockerfile.fastapi'
      - 'docker/Dockerfile.model-server'
      - 'requirements/requirements-fastapi.txt'
      - 'requirements/requirements-model.txt'

jobs:

  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Activate virtual environment
        run: |
          if [ ! -d "venv" ]; then
            python3 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt -q
          fi
          echo "$PWD/venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV

      - name: Unit tests
        run: python -m pytest tests/test_preprocessor.py -v

      - name: Start FastAPI
        env:
          MODEL_SERVER_URL: http://localhost:5001
          PSQL_APP_HOST: localhost
          PSQL_APP_USER: ${{ secrets.PSQL_APP_USER }}
          PSQL_APP_PASSWORD: ${{ secrets.PSQL_APP_PASSWORD }}
          PSQL_APP_DB: ${{ secrets.PSQL_APP_DB }}
        run: |
          uvicorn api.main:app --host 0.0.0.0 --port 8005 &
          sleep 5

      - name: Integration tests (no model needed)
        env:
          API_URL: http://localhost:8005
        run: |
          python -m pytest tests/test_api.py -v -m "not needs_model"
          pkill -f "uvicorn api.main:app" || true

  build:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build FastAPI image
        run: docker build -f docker/Dockerfile.fastapi -t garnet-fastapi:latest .

      - name: Build model-server image
        run: docker build -f docker/Dockerfile.model-server -t garnet-model:latest .

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      MLFLOW_TRACKING_URI: http://localhost:5000
      REGISTRY: garnet-classifier
    steps:
      - uses: actions/checkout@v4

      - name: Activate virtual environment
        run: |
          echo "$PWD/venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV

      - name: Deploy + verify + promote or rollback
        env:
          API_URL: http://localhost:8000
        run: |
          # Save current images for rollback
          OLD_API=$(docker inspect fastapi \
            --format='{{.Config.Image}}' 2>/dev/null || echo "")
          OLD_MODEL=$(docker inspect model-server \
            --format='{{.Config.Image}}' 2>/dev/null || echo "")
          echo "Rollback point: api=${OLD_API:-none} model=${OLD_MODEL:-none}"

          # Deploy new containers
          docker compose -f docker-compose.yml up -d --build fastapi model-server

          # Wait for /ready (max 10 min)
          HEALTHY=false
          SECONDS=0
          while [ $SECONDS -lt 600 ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8000/ready 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              HEALTHY=true
              echo "/ready=200 after ${SECONDS}s"
              break
            fi
            echo "  /ready=$STATUS... (${SECONDS}s elapsed)"
            sleep 10
          done

          # Run all tests against live system
          TESTS_PASS=false
          if [ "$HEALTHY" = "true" ]; then
            API_URL=http://localhost:8000 \
              python -m pytest tests/test_api.py -v \
              && TESTS_PASS=true || TESTS_PASS=false
          fi

          # Promote or rollback
          if [ "$TESTS_PASS" = "true" ]; then
            docker compose -f docker-compose.yml \
              restart prometheus grafana alertmanager 2>/dev/null || true
            echo "Deployment complete"

          else
            echo "Deployment failed — rolling back"
            python3 -c "
          import mlflow
          from mlflow.tracking import MlflowClient
          mlflow.set_tracking_uri('http://localhost:5000')
          client = MlflowClient()
          try:
              prev = client.get_model_version_by_alias('garnet-classifier', 'production_previous')
              client.set_registered_model_alias('garnet-classifier', 'production', prev.version)
              print(f'v{prev.version} → @production (rollback)')
          except Exception as e:
              print(f'No previous version: {e}')
          " 2>/dev/null || true

            docker compose -f docker-compose.yml stop fastapi model-server 2>/dev/null || true
            [ -n "$OLD_API" ] && \
              docker run -d --name fastapi --network api-network $OLD_API 2>/dev/null || true
            [ -n "$OLD_MODEL" ] && \
              docker run -d --name model-server --network api-network $OLD_MODEL 2>/dev/null || true
            exit 1
          fi